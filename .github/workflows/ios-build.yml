name: iOS Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Select Xcode version
      run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

    - name: Create iPhone 16 Simulator
      run: |
        xcrun simctl create "iPhone 16" \
          "com.apple.CoreSimulator.SimDeviceType.iPhone-16" \
          "com.apple.CoreSimulator.SimRuntime.iOS-18-2"

    - name: Build for Simulator
      run: |
        set -o pipefail
        xcodebuild build \
          -project Boathouse.xcodeproj \
          -scheme Boathouse \
          -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.2' \
          -configuration Debug \
          -derivedDataPath ./DerivedData \
          -resultBundlePath ./ResultBundle.xcresult \
          CODE_SIGNING_ALLOWED=NO \
          2>&1 | tee build.log

    - name: Run Tests
      run: |
        set -o pipefail
        xcodebuild test \
          -project Boathouse.xcodeproj \
          -scheme Boathouse \
          -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.2' \
          -configuration Debug \
          -derivedDataPath ./DerivedData \
          -resultBundlePath ./TestResultBundle.xcresult \
          CODE_SIGNING_ALLOWED=NO \
          2>&1 | tee test.log

    - name: Boot Simulator
      run: |
        xcrun simctl boot "iPhone 16" 2>/dev/null || true
        sleep 5

    - name: Install App
      run: |
        xcrun simctl install booted ./DerivedData/Build/Products/Debug-iphonesimulator/Boathouse.app

    - name: Capture Home Screen
      run: |
        xcrun simctl launch booted com.boathouse.app
        sleep 3
        xcrun simctl io booted screenshot home-screen.png

    - name: Upload Screenshot
      uses: actions/upload-artifact@v4
      with:
        name: home-screen
        path: home-screen.png

    - name: Collect post-build diagnostics
      if: always()
      run: |
        mkdir -p diagnostics

        # Full xcodebuild log (already captured via tee)
        cp build.log diagnostics/build.log 2>/dev/null || echo "No build.log found" > diagnostics/build.log

        # Test log
        cp test.log diagnostics/test.log 2>/dev/null || echo "No test.log found" > diagnostics/test.log

        # Xcode build logs from DerivedData
        if [ -d "./DerivedData/Logs/Build" ]; then
          cp -R ./DerivedData/Logs/Build diagnostics/xcode-build-logs
        fi

        # Test logs from DerivedData
        if [ -d "./DerivedData/Logs/Test" ]; then
          cp -R ./DerivedData/Logs/Test diagnostics/xcode-test-logs
        fi

        # Result bundle (contains structured build diagnostics)
        if [ -d "./ResultBundle.xcresult" ]; then
          cp -R ./ResultBundle.xcresult diagnostics/ResultBundle.xcresult
        fi

        # Test result bundle
        if [ -d "./TestResultBundle.xcresult" ]; then
          cp -R ./TestResultBundle.xcresult diagnostics/TestResultBundle.xcresult
        fi

        # Simulator system log (last 500 lines — crash/launch clues)
        xcrun simctl spawn booted log show --last 5m --style compact \
          > diagnostics/simulator-system.log 2>&1 || true

        # Crash reports
        if ls ~/Library/Logs/DiagnosticReports/*.crash 1>/dev/null 2>&1; then
          cp ~/Library/Logs/DiagnosticReports/*.crash diagnostics/ 2>/dev/null || true
        fi

        echo "=== Diagnostics collected ==="
        find diagnostics -type f | head -50

    - name: Upload diagnostics
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-diagnostics
        path: diagnostics/
        retention-days: 14

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log

    - name: Upload test log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-log
        path: test.log
