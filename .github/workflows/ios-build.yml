name: iOS Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Select Xcode version
      run: |
        # Use the latest stable Xcode available on the runner
        LATEST_XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null \
          | grep -v beta | sort -V | tail -1)
        if [ -z "$LATEST_XCODE" ]; then
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
        fi
        echo "Selected Xcode: $LATEST_XCODE"
        sudo xcode-select -s "$LATEST_XCODE/Contents/Developer"
        xcodebuild -version

    - name: Create iPhone 16 Simulator
      run: |
        # Detect the latest available iOS simulator runtime
        IOS_RUNTIME=$(xcrun simctl list runtimes -j \
          | python3 -c "
        import json, sys
        data = json.load(sys.stdin)
        runtimes = [r for r in data['runtimes'] if r['platform'] == 'iOS' and r['isAvailable']]
        if not runtimes:
            print('ERROR: No available iOS runtimes found', file=sys.stderr)
            sys.exit(1)
        latest = sorted(runtimes, key=lambda r: [int(x) for x in r['version'].split('.')])[-1]
        print(latest['identifier'])
        ")
        echo "Using iOS runtime: $IOS_RUNTIME"
        echo "IOS_RUNTIME=$IOS_RUNTIME" >> "$GITHUB_ENV"

        # Extract the OS version number (e.g. "18.2" from "...iOS-18-2")
        OS_VERSION=$(echo "$IOS_RUNTIME" | sed 's/.*iOS-//' | tr '-' '.')
        if [ -z "$OS_VERSION" ] || ! echo "$OS_VERSION" | grep -qE '^[0-9]+(\.[0-9]+)*$'; then
          echo "ERROR: Could not extract valid OS version from runtime: $IOS_RUNTIME"
          exit 1
        fi
        echo "IOS_OS_VERSION=$OS_VERSION" >> "$GITHUB_ENV"

        # Check if an iPhone 16 simulator already exists; create one if not
        if ! xcrun simctl list devices -j | python3 -c "
        import json, sys
        data = json.load(sys.stdin)
        for runtime, devices in data['devices'].items():
            for d in devices:
                if d['name'] == 'iPhone 16' and d.get('isAvailable', False):
                    sys.exit(0)
        sys.exit(1)
        " 2>/dev/null; then
          echo "Creating iPhone 16 simulator..."
          DEVICE_TYPE="com.apple.CoreSimulator.SimDeviceType.iPhone-16"
          # Fall back to any available iPhone device type if iPhone 16 is not found
          if ! xcrun simctl list devicetypes | grep -qw "iPhone 16"; then
            DEVICE_TYPE=$(xcrun simctl list devicetypes -j \
              | python3 -c "
        import json, sys
        data = json.load(sys.stdin)
        types = [t for t in data['devicetypes'] if 'iPhone' in t['name']]
        if not types:
            sys.exit('No iPhone device types found')
        print(types[-1]['identifier'])
        ")
            DEVICE_NAME=$(xcrun simctl list devicetypes -j \
              | python3 -c "
        import json, sys
        data = json.load(sys.stdin)
        types = [t for t in data['devicetypes'] if 'iPhone' in t['name']]
        print(types[-1]['name'])
        ")
            echo "iPhone 16 device type not found; using $DEVICE_NAME ($DEVICE_TYPE)"
            echo "SIM_DEVICE_NAME=$DEVICE_NAME" >> "$GITHUB_ENV"
          fi
          SIM_CREATE_NAME="${SIM_DEVICE_NAME:-iPhone 16}"
          xcrun simctl create "$SIM_CREATE_NAME" "$DEVICE_TYPE" "$IOS_RUNTIME"
        else
          echo "iPhone 16 simulator already exists"
        fi
        # Default simulator name
        echo "SIM_DEVICE_NAME=${SIM_DEVICE_NAME:-iPhone 16}" >> "$GITHUB_ENV"

    - name: Build for Simulator
      run: |
        set -o pipefail
        echo "Building with destination: platform=iOS Simulator,name=$SIM_DEVICE_NAME,OS=$IOS_OS_VERSION"
        xcodebuild build \
          -project Boathouse.xcodeproj \
          -scheme Boathouse \
          -destination "platform=iOS Simulator,name=$SIM_DEVICE_NAME,OS=$IOS_OS_VERSION" \
          -configuration Debug \
          -derivedDataPath ./DerivedData \
          -resultBundlePath ./ResultBundle.xcresult \
          CODE_SIGNING_ALLOWED=NO \
          2>&1 | tee build.log

    - name: Boot Simulator
      run: |
        xcrun simctl boot "$SIM_DEVICE_NAME" 2>/dev/null || true
        sleep 5

    - name: Install App
      run: |
        xcrun simctl install booted ./DerivedData/Build/Products/Debug-iphonesimulator/Boathouse.app

    - name: Capture Home Screen
      run: |
        xcrun simctl launch booted com.boathouse.app
        sleep 3
        xcrun simctl io booted screenshot home-screen.png

    - name: Upload Screenshot
      uses: actions/upload-artifact@v4
      with:
        name: home-screen
        path: home-screen.png

    - name: Collect post-build diagnostics
      if: always()
      run: |
        mkdir -p diagnostics

        # Full xcodebuild log (already captured via tee)
        cp build.log diagnostics/build.log 2>/dev/null || echo "No build.log found" > diagnostics/build.log

        # Xcode build logs from DerivedData
        if [ -d "./DerivedData/Logs/Build" ]; then
          cp -R ./DerivedData/Logs/Build diagnostics/xcode-build-logs
        fi

        # Result bundle (contains structured build diagnostics)
        if [ -d "./ResultBundle.xcresult" ]; then
          cp -R ./ResultBundle.xcresult diagnostics/ResultBundle.xcresult
        fi

        # Simulator system log (last 500 lines — crash/launch clues)
        xcrun simctl spawn booted log show --last 5m --style compact \
          > diagnostics/simulator-system.log 2>&1 || true

        # Crash reports
        if ls ~/Library/Logs/DiagnosticReports/*.crash 1>/dev/null 2>&1; then
          cp ~/Library/Logs/DiagnosticReports/*.crash diagnostics/ 2>/dev/null || true
        fi

        echo "=== Diagnostics collected ==="
        find diagnostics -type f | head -50

    - name: Upload diagnostics
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-diagnostics
        path: diagnostics/
        retention-days: 14

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
